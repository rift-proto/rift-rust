# cargo-deny configuration for rifts
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
ignore = [
    # fxhash — transitive dependency from sled; no security impact
    { id = "RUSTSEC-2025-0057", reason = "transitive dep via sled; no security impact" },
    # web-time crate predecessor — transitive; no security impact
    { id = "RUSTSEC-2024-0384", reason = "transitive dep; replaced by web-time; no security impact" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
# Workspace crates use `workspace = true` which is not a wildcard
deny = [
  { name = "openssl-sys", wrappers = [] },
]
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
