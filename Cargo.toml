[package]
name = "rifts"
version = "0.3.10"
edition = "2024"
authors = ["Zhenyi <434836402@qq.com>"]
description = "Rift Realtime Protocol / 1.0 — server + client implementation"
repository = "https://github.com/rift-proto/rifts"
homepage = "https://github.com/rift-proto/rifts"
documentation = "https://docs.rs/rifts"
readme = "README.adoc"
license = "MIT OR Apache-2.0"
keywords = ["realtime", "websocket", "messaging", "pubsub", "protocol"]
categories = ["network-programming", "web-programming::websocket"]

[features]
default = ["websocket"]

# Standalone WebSocket transport (default).
websocket = ["dep:tokio-tungstenite"]

# Async client SDK with auto-reconnect, heartbeat, and typed events.
client = ["websocket", "dep:rand"]

# Embedded persistent storage via sled.
sled = ["dep:sled"]

# Framework adapters — each enables a TransportConnection impl for
# the framework's WebSocket type.
axum = ["dep:axum"]
actix-web = ["dep:actix-web", "dep:actix-ws"]
warp = ["dep:warp"]
ntex = ["dep:ntex"]

# Composite shortcuts.
tokio-frameworks = ["axum", "warp"]
all-frameworks = ["axum", "actix-web", "warp", "ntex"]
redis = ["dep:redis"]

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["url"], optional = true }
futures-util = { version = "0.3", features = ["sink"] }
bytes = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ciborium = "0.2"
uuid = { version = "1", features = ["v4", "v7"] }
ulid = "1"
parking_lot = "0.12"
dashmap = "6"
thiserror = "1"
tracing = "0.1"
async-trait = "0.1"
tokio-util = { version = "0.7", features = ["rt", "codec"] }
sled = { version = "0.34", optional = true }
rand = { version = "0.9", optional = true }

# Framework adapters (optional, gated by features).
axum = { version = "0.8", optional = true, features = ["ws"] }
actix-web = { version = "4", optional = true }
actix-ws = { version = "0.3", optional = true }
warp = { version = "0.3", optional = true }
ntex = { version = "2", optional = true, features = ["ws"] }
redis = { version = "1.3.0", features = ["tokio-comp", "aio", "streams"], optional = true }

[dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
criterion = { version = "0.5", features = ["async_tokio"] }
tempfile = "3"

[[example]]
name = "redis_multi_instance"
required-features = ["redis"]

[[bench]]
name = "wire_frame"
path = "benches/wire_frame.rs"
harness = false

