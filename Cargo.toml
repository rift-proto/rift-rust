[[bench]]
name = "flow_control"
path = "benches/flow_control.rs"
harness = false

[[bench]]
name = "fanout"
path = "benches/fanout.rs"
harness = false

[[bench]]
name = "topic_store"
path = "benches/topic_store.rs"
harness = false

[[bench]]
name = "storage_memory"
path = "benches/storage_memory.rs"
